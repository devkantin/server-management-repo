[defaults]
# Inventory
inventory = ./inventory/hosts.ini
host_key_checking = False

# Execution
timeout = 300
forks = 10
max_retries = 3

# Logging
log_path = ./logs/ansible.log

# Paths
roles_path = ./roles
library = ./library
plugins = ./plugins

# Privileges
become = True
become_method = sudo
become_user = root

# SSH
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o ConnectTimeout=10

# Output
callback_whitelist = profile_tasks, timer
force_color = True
display_skipped_hosts = False
display_ok_hosts = True

# Handlers
any_errors_fatal = False

