---
- name: Windows Daily System Health Check
  hosts: windows_servers
  gather_facts: yes
  
  tasks:
    - name: Get system information
      win_shell: |
        Write-Host "Computer: $env:COMPUTERNAME"
        Write-Host "OS: $(Get-WmiObject -Class Win32_OperatingSystem | Select-Object -ExpandProperty Caption)"
        Write-Host "Version: $(Get-WmiObject -Class Win32_OperatingSystem | Select-Object -ExpandProperty Version)"
        Write-Host "Build: $(Get-WmiObject -Class Win32_OperatingSystem | Select-Object -ExpandProperty BuildNumber)"
      register: system_info
      changed_when: false
    
    - name: Get uptime
      win_shell: |
        $os = Get-WmiObject -Class Win32_OperatingSystem
        $uptime = [datetime]::Now - [datetime]$os.LastBootUpTime
        "Uptime: $($uptime.Days) days, $($uptime.Hours) hours, $($uptime.Minutes) minutes"
      register: uptime
      changed_when: false
    
    - name: Check CPU usage
      win_shell: |
        Get-WmiObject -Class Win32_PerfFormattedData_PerfOS_Processor -Filter "Name='_Total'" | 
        Select-Object -ExpandProperty '% Processor Time'
      register: cpu_usage
      changed_when: false
    
    - name: Check memory usage
      win_shell: |
        $os = Get-WmiObject -Class Win32_OperatingSystem
        $free = $os.FreePhysicalMemory / 1MB
        $total = $os.TotalVisibleMemorySize / 1MB
        $used = $total - $free
        $percent = ($used / $total) * 100
        "Memory Used: $([Math]::Round($percent, 2))%"
      register: memory_usage
      changed_when: false
    
    - name: Get disk space information
      win_shell: |
        Get-Volume | Where-Object {$_.DriveLetter -ne $null} | 
        Select-Object DriveLetter, @{N='SizeGB';E={[math]::Round($_.Size/1GB,2)}}, 
                      @{N='FreeGB';E={[math]::Round($_.SizeRemaining/1GB,2)}},
                      @{N='PercentFree';E={[math]::Round(($_.SizeRemaining/$_.Size)*100,2)}} | 
        Format-Table -AutoSize
      register: disk_space
      changed_when: false
    
    - name: Display Windows system health report
      debug:
        msg: |
          ========== WINDOWS SYSTEM HEALTH REPORT ==========
          {{ system_info.stdout }}
          
          â±ï¸ Uptime:
          {{ uptime.stdout }}
          
          í²» CPU Usage: {{ cpu_usage.stdout }}%
          
          í²¾ Memory Usage:
          {{ memory_usage.stdout }}
          
          í²¿ Disk Space:
          {{ disk_space.stdout }}

