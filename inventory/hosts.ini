# Cloud Support Infrastructure Inventory

[linux_servers]
linux-web-01 ansible_host=192.168.1.10 ansible_user=admin
linux-web-02 ansible_host=192.168.1.11 ansible_user=admin
linux-db-01 ansible_host=192.168.1.20 ansible_user=admin
linux-app-01 ansible_host=192.168.1.30 ansible_user=admin

[windows_servers]
windows-web-01 ansible_host=192.168.2.10 ansible_user=Administrator ansible_connection=winrm ansible_port=5985
windows-db-01 ansible_host=192.168.2.20 ansible_user=Administrator ansible_connection=winrm ansible_port=5985
windows-app-01 ansible_host=192.168.2.30 ansible_user=Administrator ansible_connection=winrm ansible_port=5985

[webservers]
linux-web-01
linux-web-02
windows-web-01

[dbservers]
linux-db-01
windows-db-01

[appservers]
linux-app-01
windows-app-01

[linux_servers:vars]
ansible_python_interpreter=/usr/bin/python3

[windows_servers:vars]
ansible_connection=winrm
ansible_winrm_operation_timeout_sec=300
ansible_winrm_read_timeout_sec=600

[all:vars]
environment=production
region=us-east-1
